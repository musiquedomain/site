<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>musique.com — Premium domain for sale</title>
<meta name="description" content="musique.com — a premium one-word .com for music and entertainment brands. Available for acquisition.">
<style>
  :root{
    --pink:#ff2e93;
    --purple:#8b3dff;
    --blue:#2f6bff;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#000;
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px 22px;
    text-align:center;
    overflow-x:hidden;
    position:relative;
  }
  /* soft ambient glow behind the logo */
  body::before{
    content:"";
    position:fixed;
    top:38%;
    left:50%;
    width:min(760px,110vw);
    height:min(760px,110vw);
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,rgba(139,61,255,.28),rgba(47,107,255,.12) 45%,transparent 70%);
    filter:blur(20px);
    pointer-events:none;
    z-index:0;
  }
  main{
    position:relative;
    z-index:1;
    width:100%;
    max-width:760px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .logo{
    width:100%;
    max-width:620px;
    height:auto;
    display:block;
    margin-bottom:34px;
  }
  h1{
    font-size:clamp(1.35rem,4.6vw,2.15rem);
    font-weight:700;
    line-height:1.3;
    letter-spacing:-.01em;
    max-width:18ch;
    margin:0 auto;
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  p.sub{
    margin-top:20px;
    font-size:clamp(1rem,2.9vw,1.2rem);
    line-height:1.6;
    color:#c7c7cf;
    max-width:34ch;
  }
  .cta{
    margin-top:38px;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:15px 30px;
    border-radius:999px;
    font-size:clamp(1rem,3vw,1.1rem);
    font-weight:600;
    color:#fff;
    text-decoration:none;
    background:linear-gradient(90deg,var(--pink),var(--purple),var(--blue));
    box-shadow:0 10px 34px rgba(139,61,255,.38);
    transition:transform .15s ease,box-shadow .15s ease,filter .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .cta:hover,.cta:focus-visible{
    transform:translateY(-2px);
    box-shadow:0 14px 40px rgba(139,61,255,.5);
    filter:brightness(1.06);
    outline:none;
  }
  .cta:active{transform:translateY(0);}
  .cta svg{width:1.15em;height:1.15em;fill:currentColor;flex:none;}
  .note{
    margin-top:16px;
    font-size:.92rem;
    color:#8a8a94;
  }
  .note a{
    color:#fff;
    text-decoration:none;
    font-weight:600;
    border-bottom:1px solid rgba(255,255,255,.35);
    padding-bottom:1px;
  }
  .note a:hover{border-bottom-color:#fff;}
  footer{
    position:relative;
    z-index:1;
    margin-top:52px;
    font-size:.82rem;
    color:#5f5f68;
  }
  @media (max-width:420px){
    .logo{margin-bottom:26px;}
    .cta{width:100%;justify-content:center;}
  }
</style>
</head>
<body>
  <main>
    <img class="logo" src="logo.png" alt="musique.com">
    <h1>Premium one-word .com for music and entertainment brands</h1>
    <p class="sub">Available for acquisition. Serious inquiries via DM</p>

    <a class="cta" href="https://x.com/musiquedomain" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644Z"/></svg>
      DM @musiquedomain on X
    </a>
  </main>
</body>
</html>
